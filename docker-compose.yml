version: "3.8"

services:
  mysql:
    container_name: mysql_sakila
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: sakila
    volumes:
      - ./sakila-db:/docker-entrypoint-initdb.d
    command:
      --default-authentication-plugin=mysql_native_password

  # опционально: клиентская утилита (если хочешь bash в контейнере)
  mysql-client:
    image: busybox
    depends_on:
      - mysql
    command: sh -c "sleep 10 && echo 'mysql ready' || echo 'mysql not ready'"